      </div>
      <div id="2fa" class="item">
        <h1 i18n="profile_twoFactorAuth"></h1>
        <div class="flex">
          <h4 i18n="profile_status"></h4>
          <h4 id="2fa_status"></h4>
        </div>
        <div class="flex">
          <h4 i18n="profile_type"></h4>
          <select name="Type" id="2fa_type">
            <option value="0" i18n="profile_authenticator"></option>
            <option value="1" i18n="profile_emailType"></option>
            <option value="2" i18n="profile_selectType"></option>
          </select>
        </div>

        <div class="flex end">
          <Button id="2fa_enable"></Button>
        </div>
      </div>
      <div id="passkeys" class="item">
        <h1 i18n="profile_passkeys"></h1>

        <div id="passkeysTable" class="passkeys">
        </div>

        <div class="flex end">
          <button id="createPasskey" i18n="profile_createPasskey"></button>
        </div>
      </div>
      <div class="item">
        <h1 i18n="profile_myDevices"></h1>

        <div id="devicesContainer" class="thirdPartyApps-container">
          <svg class="spin" width="32" height="32" fill="white">
            <use href="#loader-circle"></use>
          </svg>
        </div>

        <div class="flex end">
          <button id="logoutAllDevices" i18n="profile_logoutAllDevices"></button>
        </div>
      </div>
      <div id="thirdPartyApps" class="item">
        <h1 i18n="profile_thirdPartyApps"></h1>
        <div id="thirdPartyAppsContainer" class="thirdPartyApps-container">
          <p i18n="profile_noThirdPartyApps"></p>
        </div>
      </div>
      <div id="apiKeys" class="item">
        <h1 i18n="profile_apiKeys"></h1>

        <table id="apiKeysTable" class="apiKeysTable">
          <tr>
            <th i18n="profile_label"></th>
            <th i18n="profile_key"></th>
            <th i18n="profile_scope"></th>
            <th i18n="profile_actions"></th>
          </tr>
        </table>
        <div class="flex end">
          <button id="createApiKey" i18n="profile_createNew"></button>
        </div>
      </div>
      <div id="ssoCredentials" class="item">
        <h1 i18n="profile_singleSignOn"></h1>
        <div id="ssoClientsContainer" class="ssoClients">
          <p i18n="profile_noSsoClients"></p>
        </div>

        <div class="flex end">
          <button id="createSsoCredentials" i18n="profile_createNew"></button>
        </div>

        <template>
          <div>
            <div class="collapsible">
              <img src="" alt="" class="rounded">
              <h1></h1>
              <a href=""></a>
            </div>
            <div class="collapsible-content">
              <div class="input-group">
                <div style="display:inline-block;width: 50%;">
                  <label for="sso_clientId" i18n="profile_clientId"></label>
                  <input id="sso_clientId" type="text" disabled>
                </div>
                <div style="display:inline-block;width: 50%;">
                  <label for="sso_clientSecret" i18n="profile_clientSecret"></label>
                  <input id="sso_clientSecret" type="text" disabled>
                </div>
              </div>
              <div class="input-group">
                <div style="display:inline-block;width: 50%;">
                  <label for="sso_logoUrl" i18n="profile_logoUrl"></label>
                  <input id="sso_logoUrl" type="text">
                </div>
                <div style="display:inline-block;width: 50%;">
                  <label for="sso_websiteUrl" i18n="profile_websiteUrl"></label>
                  <input id="sso_websiteUrl" type="text">
                </div>
              </div>
              <div class="input-group">
                <div style="display:inline-block;width: 50%;">
                  <label for="sso_name" i18n="profile_name"></label>
                  <input id="sso_name" type="text">
                </div>
              </div>
              <div class="flex end">
                <button id="sso_delete" i18n="profile_delete"></button>
                <button id="sso_save" i18n="profile_save"></button>
              </div>

              <p i18n="profile_audiences"></p>
              <div id="sso_audiences" class="ssoRedirects">
                <div>
                  <input type="text">
                  <button id="sso_addAudience" i18n="profile_add"></button>
                </div>
              </div>
              
              <p i18n="profile_redirects"></p>
              <div id="sso_redirects" class="ssoRedirects">
                <div>
                  <input type="text">
                  <button id="sso_addRedirect" i18n="profile_add"></button>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>

      <div id="dangerZone" class="item dangerZone">
        <h1 i18n="profile_dangerZone"></h1>

        <p>
          <b i18n="profile_warning"></b> <span i18n="profile_dangerWarning"></span>
        </p>

        <button id="deleteAccount" i18n="profile_deleteAccount"></button>
      </div>
    </div>
  </div>
  <button target-dialog target="passwordDialog" style="display: none;"></button>
  <button target-dialog target="authenticatorDialog" style="display: none;"></button>
  <button target-dialog target="createSSODialog" style="display: none;"></button>
  <button target-dialog target="apiKeyDialog" style="display: none;"></button>
  <div id="apiKeyDialog" class="custom-dialog">
    <input id="label" i18n-placeholder="profile_placeholder_label" type="text">
    <input id="scope" i18n-placeholder="profile_placeholder_scope" type="text">

    <div class="flex end">
      <Button type="submit" i18n="profile_create"></Button>
    </div>
  </div>
  <div id="passwordDialog" class="custom-dialog">
    <input id="passwordInput" i18n-placeholder="profile_placeholder_password" type="password">
    <input id="2faInput" i18n-placeholder="profile_placeholder_mfaToken" type="text">

    <div class="flex end">
      <Button type="submit" i18n="profile_confirm"></Button>
    </div>
  </div>
  <div id="authenticatorDialog" class="custom-dialog">
    <img src="" alt="Qr Code">
    <h1></h1>

    <div class="flex end">
      <Button type="submit" i18n="profile_confirm"></Button>
    </div>
  </div>
  <div id="createSSODialog" class="custom-dialog">
    <h1 i18n="profile_createSsoClient"></h1>
    <input id="c_sso_name" type="text" i18n-placeholder="profile_placeholder_name">
    <input id="c_sso_url" type="text" i18n-placeholder="profile_placeholder_url">
    <input id="c_sso_logoUrl" type="text" i18n-placeholder="profile_placeholder_logoUrl">

    <div class="flex end">
      <Button type="submit" i18n="profile_confirm"></Button>
    </div>
  </div>

   <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
    <symbol id="loader-circle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
    </symbol>
   </svg>
</body>
